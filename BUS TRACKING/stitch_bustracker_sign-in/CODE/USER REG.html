<html>
  <head>
    <meta charset="UTF-8" />
    <link rel="preconnect" href="https://fonts.gstatic.com/" crossorigin="" />
    <link
      rel="stylesheet"
      as="style"
      onload="this.rel='stylesheet'"
      href="https://fonts.googleapis.com/css2?display=swap&amp;family=Noto+Sans%3Awght%40400%3B500%3B700%3B900&amp;family=Plus+Jakarta+Sans%3Awght%40400%3B500%3B700%3B800"
    />

    <title>BUS TRACKING</title>
    <link rel="icon" type="image/x-icon" href="data:image/x-icon;base64," />

    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  </head>
  <body>
    <div
      class="relative flex h-auto min-h-screen w-full flex-col bg-gradient-to-br from-blue-50 to-indigo-100 group/design-root overflow-x-hidden"
      style='font-family: "Plus Jakarta Sans", "Noto Sans", sans-serif;'
    >
      <div class="layout-container flex h-full grow flex-col">
        <div class="flex flex-1 items-center justify-center px-6 py-10">
          <div class="w-full max-w-md">
            <!-- Header Section -->
            <div class="text-center mb-8">
              <div class="flex items-center justify-center mb-4">
                <div class="size-12 bg-gradient-to-r from-blue-600 to-indigo-600 rounded-xl flex items-center justify-center">
                  <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="white" viewBox="0 0 256 256">
                    <path d="M184,32H72A32,32,0,0,0,40,64V208a16,16,0,0,0,16,16H80a16,16,0,0,0,16-16V192h64v16a16,16,0,0,0,16,16h24a16,16,0,0,0,16-16V64A32,32,0,0,0,184,32ZM56,176V120H200v56Zm0-96H200v24H56ZM72,48H184a16,16,0,0,1,16,16H56A16,16,0,0,1,72,48Zm8,160H56V192H80Zm96,0V192h24v16Zm-72-60a12,12,0,1,1-12-12A12,12,0,0,1,104,148Zm72,0a12,12,0,1,1-12-12A12,12,0,0,1,176,148Zm72-68v24a8,8,0,0,1-16,0V80a8,8,0,0,1,16,0ZM24,80v24a8,8,0,0,1-16,0V80a8,8,0,0,1,16,0Z"></path>
                  </svg>
                </div>
              </div>
              <h2 class="text-[#0d141c] text-3xl font-bold leading-tight mb-2">Create Account</h2>
              <p class="text-[#49739c] text-base">Join the Bus Tracker community</p>
            </div>

            <!-- Registration Form Card -->
            <div class="bg-white rounded-2xl shadow-xl border border-gray-100 p-8">
              <!-- Social Login Buttons -->
              <div class="flex flex-col gap-3 mb-6">
                <button class="flex items-center justify-center h-12 w-full rounded-xl bg-white text-[#0d141c] text-sm font-semibold border border-gray-200 shadow-sm hover:bg-gray-50 hover:shadow-md transition-all duration-200 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-opacity-50">
                  <svg class="w-5 h-5 mr-3" viewBox="0 0 24 24">
                    <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                    <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                    <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                    <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                  </svg>
                  Continue with Google
                </button>
                <button class="flex items-center justify-center h-12 w-full rounded-xl bg-black text-white text-sm font-semibold hover:bg-gray-800 transition-all duration-200 focus:outline-none focus:ring-2 focus:ring-gray-500 focus:ring-opacity-50">
                  <svg class="w-5 h-5 mr-3" fill="currentColor" viewBox="0 0 24 24">
                    <path d="M12.017 0C5.396 0 .029 5.367.029 11.987c0 5.079 3.158 9.417 7.618 11.174-.105-.949-.199-2.403.041-3.439.219-.937 1.406-5.957 1.406-5.957s-.359-.72-.359-1.781c0-1.663.967-2.911 2.168-2.911 1.024 0 1.518.769 1.518 1.688 0 1.029-.653 2.567-.992 3.992-.285 1.193.6 2.165 1.775 2.165 2.128 0 3.768-2.245 3.768-5.487 0-2.861-2.063-4.869-5.008-4.869-3.41 0-5.409 2.562-5.409 5.199 0 1.033.394 2.143.889 2.741.099.12.112.225.085.345-.09.375-.293 1.199-.334 1.363-.053.225-.172.271-.402.165-1.495-.69-2.433-2.878-2.433-4.646 0-3.776 2.748-7.252 7.92-7.252 4.158 0 7.392 2.967 7.392 6.923 0 4.135-2.607 7.462-6.233 7.462-1.214 0-2.357-.629-2.746-1.378l-.748 2.853c-.271 1.043-1.002 2.35-1.492 3.146C9.57 23.812 10.763 24.009 12.017 24.009c6.624 0 11.99-5.367 11.99-11.988C24.007 5.367 18.641.001.012.001z"/>
                  </svg>
                  Continue with Apple
                </button>
              </div>

              <!-- Divider -->
              <div class="relative flex items-center mb-6">
                <div class="flex-grow border-t border-gray-200"></div>
                <span class="flex-shrink mx-4 text-gray-500 text-sm font-medium">or</span>
                <div class="flex-grow border-t border-gray-200"></div>
              </div>

              <!-- Form Fields -->
              <div class="space-y-4">
                <div>
                  <label class="block text-sm font-medium text-gray-700 mb-2">Full Name</label>
                  <input id="reg-fullname"
                    placeholder="Enter your full name"
                    class="w-full h-12 px-4 rounded-xl border border-gray-200 bg-gray-50 text-gray-900 placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all duration-200"
                    value=""
                  />
                </div>
                
                <div>
                  <label class="block text-sm font-medium text-gray-700 mb-2">Email Address</label>
                  <input id="reg-email"
                    type="email"
                    placeholder="Enter your email"
                    class="w-full h-12 px-4 rounded-xl border border-gray-200 bg-gray-50 text-gray-900 placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all duration-200"
                    value=""
                  />
                </div>
                
                <div>
                  <label class="block text-sm font-medium text-gray-700 mb-2">Password</label>
                  <input id="reg-password"
                    type="password"
                    placeholder="Create a strong password"
                    class="w-full h-12 px-4 rounded-xl border border-gray-200 bg-gray-50 text-gray-900 placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all duration-200"
                    value=""
                  />
                </div>
              </div>
              <!-- Sign Up Button -->
              <button id="signup-btn"
                class="w-full h-12 bg-gradient-to-r from-blue-600 to-indigo-600 text-white font-semibold rounded-xl hover:from-blue-700 hover:to-indigo-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 transition-all duration-200 shadow-lg hover:shadow-xl"
              >
                Create Account
              </button>
              
              <!-- Terms and Privacy -->
              <p class="text-xs text-gray-500 text-center mt-4">
                By creating an account, you agree to our 
                <a href="#" class="text-blue-600 hover:underline">Terms of Service</a> 
                and 
                <a href="#" class="text-blue-600 hover:underline">Privacy Policy</a>
              </p>
            </div>
            
            <!-- Sign In Link -->
            <div class="text-center mt-6">
              <p class="text-gray-600 text-sm">
                Already have an account? 
                <a href="SIGNIN.html" class="text-blue-600 font-semibold hover:underline">Sign in</a>
              </p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
<script>
  (function () {
    var btn = document.getElementById('signup-btn');
    if (!btn) return;
    btn.addEventListener('click', function (e) {
      e.preventDefault();
      var fullName = document.getElementById('reg-fullname');
      var email = document.getElementById('reg-email');
      var password = document.getElementById('reg-password');
      var nameVal = (fullName && fullName.value || '').trim();
      var emailVal = (email && email.value || '').trim();
      var passVal = (password && password.value || '').trim();

      if (!nameVal || !emailVal || !passVal) {
        alert('Please fill in full name, email, and password.');
        return;
      }

      // Optionally store a flag to mimic registration success
      try { localStorage.setItem('registeredEmail', emailVal); } catch (e) {}

      // Redirect to Sign In page after successful registration
      window.location.href = 'SIGNIN.html';
    });
  })();
</script>
